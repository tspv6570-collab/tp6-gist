<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotion Matching Quiz</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 24px rgba(0,0,0,0.06);
    padding: 2rem 2rem 1.75rem;
    max-width: 760px;
    width: 100%;
  }

  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .header p { font-size: 13.5px; color: #666; line-height: 1.6; }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }

  @media (max-width: 560px) {
    .columns { grid-template-columns: 1fr; }
    .card { padding: 1.25rem 1rem; }
  }

  .col-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
    margin-bottom: 8px;
  }

  .stmt-card {
    background: #fff;
    border: 1px solid #e4e4e0;
    border-radius: 10px;
    padding: 10px 13px;
    margin-bottom: 7px;
    font-size: 13px;
    color: #222;
    line-height: 1.55;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    display: flex;
    gap: 9px;
    align-items: flex-start;
  }
  .stmt-card:hover { background: #f9f9f7; border-color: #ccc; }
  .stmt-card .letter { font-weight: 600; font-size: 13px; color: #888; min-width: 18px; flex-shrink: 0; }
  .stmt-card.selected { border-color: #555; background: #f3f3f1; }
  .stmt-card.pending-wrong { border-color: #c0522a; background: #fdf1ed; cursor: pointer; }
  .stmt-card.pending-wrong .letter { color: #a8391a; }
  .stmt-card.correct { border-color: #1a9068; background: #eaf7f2; cursor: default; }
  .stmt-card.correct .letter { color: #136b4d; }
  .stmt-card.correct:hover { background: #eaf7f2; border-color: #1a9068; }

  .emotion-btn {
    background: #fff;
    border: 1px solid #e4e4e0;
    border-radius: 10px;
    padding: 10px 13px;
    margin-bottom: 7px;
    font-size: 13px;
    color: #222;
    cursor: pointer;
    width: 100%;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 9px;
    transition: background 0.12s, border-color 0.12s;
    font-family: inherit;
  }
  .emotion-btn:hover { background: #f9f9f7; border-color: #ccc; }
  .emotion-btn i { font-size: 17px; color: #999; flex-shrink: 0; }
  .emotion-btn.used { opacity: 0.38; pointer-events: none; }
  .emotion-btn.correct { border-color: #1a9068; background: #eaf7f2; color: #136b4d; pointer-events: none; }
  .emotion-btn.correct i { color: #1a9068; }

  .feedback-bar {
    margin-top: 1rem;
    padding: 9px 13px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }
  .feedback-bar.show { display: block; }
  .feedback-bar.ok { background: #eaf7f2; color: #136b4d; border: 1px solid #1a9068; }
  .feedback-bar.err { background: #fdf1ed; color: #a8391a; border: 1px solid #c0522a; }

  .bottom {
    margin-top: 1.25rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    flex-wrap: wrap;
  }
  .score-wrap { display: flex; align-items: baseline; gap: 5px; }
  .score-num { font-size: 22px; font-weight: 600; color: #111; }
  .score-label { font-size: 13px; color: #888; }

  .reset-btn {
    padding: 7px 16px;
    font-size: 13px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #333;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    transition: background 0.12s;
  }
  .reset-btn:hover { background: #f3f3f1; }
  .reset-btn i { font-size: 15px; }

  .complete-msg {
    font-size: 14px;
    font-weight: 500;
    color: #136b4d;
    margin-top: 0.75rem;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Emotion Matching Quiz</h1>
    <p>Select a statement (A–H) on the left, then click the emotion on the right that best matches it. If you get one wrong, keep trying until you find the correct answer!</p>
  </div>

  <div class="columns">
    <div><div class="col-label">Statements</div><div id="stmts"></div></div>
    <div><div class="col-label">Emotions</div><div id="emotions"></div></div>
  </div>

  <div class="feedback-bar" id="feedback"></div>

  <div class="bottom">
    <div class="score-wrap">
      <span class="score-num" id="score">0</span>
      <span class="score-label">/ 8 correct</span>
    </div>
    <button class="reset-btn" onclick="reset()"><i class="ti ti-refresh"></i> Start over</button>
  </div>
  <div id="complete-msg" class="complete-msg">🎉 Well done — all 8 matched correctly!</div>
</div>

<script>
const DATA = [
  { letter: 'A', text: 'One thing that always makes me feel embarrassed is I say the wrong thing at the wrong time.', emotion: 'Embarrassment', icon: 'ti-mood-sad' },
  { letter: 'B', text: "There's only one thing that really stresses me.", emotion: 'Stress', icon: 'ti-brain' },
  { letter: 'C', text: 'It makes me completely crazy.', emotion: 'Anger / Frustration', icon: 'ti-flame' },
  { letter: 'D', text: 'I find all sorts of strange situations quite funny.', emotion: 'Amusement', icon: 'ti-mood-smile' },
  { letter: 'E', text: 'The thing that frightens me the most is watching horror films.', emotion: 'Fear', icon: 'ti-ghost' },
  { letter: 'F', text: 'It just puts me in a really great mood.', emotion: 'Happiness', icon: 'ti-sun' },
  { letter: 'G', text: 'I absolutely detest snakes.', emotion: 'Disgust / Hatred', icon: 'ti-mood-confuzed' },
  { letter: 'H', text: "I know you shouldn't laugh, but I can't stop myself from laughing.", emotion: 'Uncontrollable laughter', icon: 'ti-mood-laugh' },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffledEmotions = shuffle(DATA.map(d => ({ emotion: d.emotion, icon: d.icon, letter: d.letter })));
let selectedLetter = null;
let correctSet = new Set();
let wrongLetter = null;
let score = 0;

function render() {
  const stmtsEl = document.getElementById('stmts');
  const emotionsEl = document.getElementById('emotions');
  stmtsEl.innerHTML = '';
  emotionsEl.innerHTML = '';

  DATA.forEach(d => {
    const div = document.createElement('div');
    const isCorrect = correctSet.has(d.letter);
    const isWrong = wrongLetter === d.letter;
    const isSelected = selectedLetter === d.letter;
    let cls = 'stmt-card';
    if (isCorrect) cls += ' correct';
    else if (isWrong) cls += ' pending-wrong';
    else if (isSelected) cls += ' selected';
    div.className = cls;
    div.innerHTML = `<span class="letter">${d.letter}.</span><span>${d.text}</span>`;
    if (!isCorrect) div.onclick = () => selectStmt(d.letter);
    stmtsEl.appendChild(div);
  });

  shuffledEmotions.forEach(e => {
    const btn = document.createElement('button');
    const isUsed = [...correctSet].some(k => DATA.find(d => d.letter === k).emotion === e.emotion);
    btn.className = 'emotion-btn' + (isUsed ? ' used correct' : '');
    btn.innerHTML = `<i class="ti ${e.icon}"></i>${e.emotion}`;
    if (!isUsed) btn.onclick = () => selectEmotion(e.emotion);
    emotionsEl.appendChild(btn);
  });

  document.getElementById('score').textContent = score;
}

function selectStmt(letter) {
  if (correctSet.has(letter)) return;
  selectedLetter = letter;
  wrongLetter = null;
  showFeedback('', '');
  render();
}

function selectEmotion(emotionName) {
  if (selectedLetter === null) {
    showFeedback('Please select a statement first.', 'err');
    return;
  }
  const correctEmotion = DATA.find(d => d.letter === selectedLetter).emotion;
  if (emotionName === correctEmotion) {
    correctSet.add(selectedLetter);
    score++;
    showFeedback(`Correct! Statement ${selectedLetter} expresses ${emotionName}.`, 'ok');
    wrongLetter = null;
    selectedLetter = null;
    if (score === 8) {
      document.getElementById('complete-msg').style.display = 'block';
    }
  } else {
    wrongLetter = selectedLetter;
    selectedLetter = null;
    showFeedback(`Not quite — keep trying for statement ${wrongLetter}!`, 'err');
  }
  render();
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.className = 'feedback-bar' + (msg ? ' show ' + type : '');
  el.textContent = msg;
}

function reset() {
  selectedLetter = null;
  correctSet = new Set();
  wrongLetter = null;
  score = 0;
  shuffledEmotions = shuffle(DATA.map(d => ({ emotion: d.emotion, icon: d.icon, letter: d.letter })));
  document.getElementById('complete-msg').style.display = 'none';
  showFeedback('', '');
  render();
}

render();
</script>
</body>
</html>
